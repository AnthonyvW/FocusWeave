name: Build Executables

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: FocusWeave-windows.exe
            built_path: dist/FocusWeave.exe
          - os: ubuntu-latest
            artifact_name: FocusWeave-linux
            built_path: dist/FocusWeave

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller focusweave.spec

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: ${{ matrix.built_path }}
          asset_name: ${{ matrix.artifact_name }}

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.built_path }}