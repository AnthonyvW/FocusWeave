name: Build Executables

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: FocusWeave-windows
            built_path: dist/FocusWeave.exe
            release_name: FocusWeave-windows.exe
          - os: ubuntu-latest
            artifact_name: FocusWeave-linux
            built_path: dist/FocusWeave
            release_name: FocusWeave-linux

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller focusweave.spec

      - name: Rename artifact for release
        run: mv ${{ matrix.built_path }} dist/${{ matrix.release_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: dist/${{ matrix.release_name }}

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.release_name }}